name: Build and Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            wails_flags: "-tags webkit2_41,draco,cgal"
            cli_targets: "linux/amd64 linux/arm64"
            cgal_cli_targets: "linux/amd64"
          - os: windows-latest
            platform: windows-amd64
            wails_flags: "-tags cgal"
            cli_targets: "windows/amd64"
            cgal_cli_targets: "windows/amd64"
          - os: macos-latest
            platform: macos-universal
            wails_flags: ""
            cli_targets: "darwin/amd64 darwin/arm64"
            cgal_cli_targets: "darwin/arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config libcgal-dev libgmp-dev libmpfr-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cgal gmp mpfr

      - name: Restore vcpkg cache
        if: runner.os == 'Windows'
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-windows-cgal-v1

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install cgal:x64-windows-static
          echo "CGO_CXXFLAGS=-std=c++17 -I${VCPKG_INSTALLATION_ROOT}/installed/x64-windows-static/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L${VCPKG_INSTALLATION_ROOT}/installed/x64-windows-static/lib -lgmp -lmpfr" >> "$GITHUB_ENV"

      - name: Save vcpkg cache
        if: runner.os == 'Windows' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-windows-cgal-v1

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'Version = "ditherforge' internal/pipeline/version.go | sed 's/.*ditherforge \(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then echo "::error::Failed to extract version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # --- GUI binary ---

      - name: Build GUI
        if: runner.os != 'macOS'
        shell: bash
        run: wails build ${{ matrix.wails_flags }}

      - name: Build GUI (macOS universal with CGAL on arm64)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Build arm64 with CGAL linked in.
          wails build -platform darwin/arm64 -tags cgal
          cp build/bin/ditherforge.app/Contents/MacOS/ditherforge ditherforge-gui-arm64

          # Build amd64 without CGAL (no cross-compiled GMP/MPFR available).
          wails build -platform darwin/amd64
          cp build/bin/ditherforge.app/Contents/MacOS/ditherforge ditherforge-gui-amd64

          # Combine into universal binary inside the .app bundle.
          lipo -create -output build/bin/ditherforge.app/Contents/MacOS/ditherforge \
            ditherforge-gui-arm64 ditherforge-gui-amd64
          rm ditherforge-gui-arm64 ditherforge-gui-amd64

      # --- CLI binaries ---

      - name: Build CLI (with CGAL)
        shell: bash
        run: |
          for target in ${{ matrix.cgal_cli_targets }}; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            echo "Building CLI for ${GOOS}/${GOARCH} (with CGAL)..."
            CGO_ENABLED=1 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -tags cgal -o "ditherforge-cli-${GOOS}-${GOARCH}${EXT}" ./cmd/ditherforge
          done

      - name: Build CLI (without CGAL, cross-compile)
        shell: bash
        run: |
          for target in ${{ matrix.cli_targets }}; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            OUT="ditherforge-cli-${GOOS}-${GOARCH}${EXT}"
            if [ -f "$OUT" ]; then
              echo "Skipping ${GOOS}/${GOARCH} (already built with CGAL)"
              continue
            fi
            echo "Building CLI for ${GOOS}/${GOARCH} (no CGAL)..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -o "$OUT" ./cmd/ditherforge
          done

      # --- Smoke test (Linux only) ---

      - name: Smoke test
        if: runner.os == 'Linux'
        run: |
          ./ditherforge-cli-linux-amd64 --version
          go test -tags cgal -timeout 2m ./internal/alphawrap/...
          go test -timeout 2m ./internal/...

      # --- Package ---

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: tar.gz the binary
          mkdir -p pkg
          cp build/bin/ditherforge pkg/
          cp README.md LICENSE pkg/
          tar czf "ditherforge-${VERSION}-linux-amd64.tar.gz" -C pkg .
          rm -rf pkg

          # CLI: tar.gz for each arch
          for arch in amd64 arm64; do
            mkdir -p pkg
            cp "ditherforge-cli-linux-${arch}" pkg/ditherforge-cli
            cp README.md LICENSE pkg/
            tar czf "ditherforge-cli-${VERSION}-linux-${arch}.tar.gz" -C pkg .
            rm -rf pkg
          done

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: zip the exe
          mkdir -p pkg
          cp build/bin/ditherforge.exe pkg/
          cp README.md LICENSE pkg/
          7z a "ditherforge-${VERSION}-windows-amd64.zip" ./pkg/*
          rm -rf pkg

          # CLI: zip
          mkdir -p pkg
          cp ditherforge-cli-windows-amd64.exe pkg/ditherforge-cli.exe
          cp README.md LICENSE pkg/
          7z a "ditherforge-cli-${VERSION}-windows-amd64.zip" ./pkg/*
          rm -rf pkg

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: create DMG from .app bundle
          hdiutil create -volname "DitherForge" \
            -srcfolder build/bin/ditherforge.app \
            -ov -format UDZO \
            "ditherforge-${VERSION}-macos-universal.dmg"

          # CLI: universal binary via lipo, then tar.gz
          lipo -create -output ditherforge-cli \
            ditherforge-cli-darwin-amd64 \
            ditherforge-cli-darwin-arm64
          mkdir -p pkg
          cp ditherforge-cli pkg/
          cp README.md LICENSE pkg/
          tar czf "ditherforge-cli-${VERSION}-macos-universal.tar.gz" -C pkg .
          rm -rf pkg

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            ditherforge-*.tar.gz
            ditherforge-*.zip
            ditherforge-*.exe
            ditherforge-*.dmg

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'Version = "ditherforge' internal/pipeline/version.go | sed 's/.*ditherforge \(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then echo "::error::Failed to extract version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing "latest" release and tag if present.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git tag -f latest
          git push -f origin latest

          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA:0:8}"
          cat > notes.md <<EOF
          Automated build from main branch (v${VERSION}, commit ${SHORT_SHA}).

          ## Downloads

          **GUI (desktop app):**
          - Linux: \`ditherforge-${VERSION}-linux-amd64.tar.gz\`
          - Windows: \`ditherforge-${VERSION}-windows-amd64.zip\`
          - macOS: \`ditherforge-${VERSION}-macos-universal.dmg\`

          **CLI only:**
          - Linux amd64: \`ditherforge-cli-${VERSION}-linux-amd64.tar.gz\`
          - Linux arm64: \`ditherforge-cli-${VERSION}-linux-arm64.tar.gz\`
          - Windows: \`ditherforge-cli-${VERSION}-windows-amd64.zip\`
          - macOS universal: \`ditherforge-cli-${VERSION}-macos-universal.tar.gz\`
          EOF
          # Strip leading whitespace from heredoc (YAML indentation).
          sed -i 's/^          //' notes.md

          gh release create latest \
            --title "Latest build (v${VERSION})" \
            --notes-file notes.md \
            --prerelease \
            artifacts/*
