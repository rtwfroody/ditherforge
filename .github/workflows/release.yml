name: Build and Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            wails_flags: "-tags webkit2_41,draco,cgal"
            cli_targets: "linux/amd64 linux/arm64"
            cgal_cli_targets: "linux/amd64"
          - os: windows-latest
            platform: windows-amd64
            wails_flags: "-tags draco,cgal"
            cli_targets: "windows/amd64"
            cgal_cli_targets: "windows/amd64"
          - os: macos-latest
            platform: macos-universal
            wails_flags: ""
            cli_targets: "darwin/amd64 darwin/arm64"
            cgal_cli_targets: "darwin/arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config libcgal-dev libgmp-dev libmpfr-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cgal gmp mpfr

      - name: Restore draco-c cache
        if: runner.os == 'macOS'
        id: draco-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/draco-c-install
          key: draco-c-macos-arm64-v1

      - name: Build draco-c for arm64
        if: runner.os == 'macOS' && steps.draco-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/qmuntal/draco-c.git /tmp/draco-c
          cmake -S /tmp/draco-c -B /tmp/draco-c/build \
            -DDRACO_POINT_CLOUD_COMPRESSION=ON \
            -DDRACO_MESH_COMPRESSION=ON \
            -DDRACO_STANDARD_EDGEBREAKER=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/draco-c/build --config Release
          mkdir -p /tmp/draco-c-install/lib
          cp /tmp/draco-c/build/libdraco_c.a /tmp/draco-c-install/lib/

      - name: Save draco-c cache
        if: runner.os == 'macOS' && steps.draco-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/draco-c-install
          key: draco-c-macos-arm64-v1

      - name: Install draco-c
        if: runner.os == 'macOS'
        run: |
          sudo mkdir -p /usr/local/lib
          sudo cp /tmp/draco-c-install/lib/libdraco_c.a /usr/local/lib/

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          C:/msys64/usr/bin/pacman -S --noconfirm mingw-w64-x86_64-cgal mingw-w64-x86_64-gmp mingw-w64-x86_64-mpfr
          echo "CGO_CXXFLAGS=-O3 -DNDEBUG -std=c++17 -Wa,-mbig-obj -IC:/msys64/mingw64/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-static C:/msys64/mingw64/lib/libmpfr.a C:/msys64/mingw64/lib/libgmp.a" >> "$GITHUB_ENV"

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'VersionSemver = ' internal/pipeline/version.go | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then echo "::error::Failed to extract version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # --- GUI binary ---

      - name: Build GUI
        if: runner.os != 'macOS'
        shell: bash
        run: wails build ${{ matrix.wails_flags }}

      - name: Build GUI (macOS universal with CGAL on arm64)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Build arm64 with CGAL and Draco linked in.
          # customenv tells draco-go to use our system libdraco_c instead of its bundled one.
          CGO_LDFLAGS="-L/usr/local/lib -ldraco_c -lstdc++ -lm" wails build -platform darwin/arm64 -tags customenv,draco,cgal
          cp build/bin/ditherforge.app/Contents/MacOS/ditherforge ditherforge-gui-arm64

          # Build amd64 without CGAL (no cross-compiled GMP/MPFR available).
          wails build -platform darwin/amd64
          cp build/bin/ditherforge.app/Contents/MacOS/ditherforge ditherforge-gui-amd64

          # Combine into universal binary inside the .app bundle.
          lipo -create -output build/bin/ditherforge.app/Contents/MacOS/ditherforge \
            ditherforge-gui-arm64 ditherforge-gui-amd64
          rm ditherforge-gui-arm64 ditherforge-gui-amd64

          # Verify no Homebrew dylib dependencies leaked into the binary.
          if otool -L build/bin/ditherforge.app/Contents/MacOS/ditherforge | grep -q /opt/homebrew; then
            echo "::error::Binary still links against Homebrew dylibs"
            otool -L build/bin/ditherforge.app/Contents/MacOS/ditherforge
            exit 1
          fi


      # --- CLI binaries ---

      - name: Build CLI (with CGAL)
        shell: bash
        run: |
          for target in ${{ matrix.cgal_cli_targets }}; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            TAGS="draco,cgal"
            EXTRA_LDFLAGS=""
            if [ "$(uname)" = "Darwin" ]; then
              TAGS="customenv,draco,cgal"
              EXTRA_LDFLAGS="-L/usr/local/lib -ldraco_c -lstdc++ -lm"
            fi
            echo "Building CLI for ${GOOS}/${GOARCH} (with CGAL and Draco)..."
            CGO_ENABLED=1 CGO_LDFLAGS="${CGO_LDFLAGS} ${EXTRA_LDFLAGS}" GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -tags "$TAGS" -o "ditherforge-cli-${GOOS}-${GOARCH}${EXT}" ./cmd/ditherforge
          done

      - name: Build CLI (without CGAL, cross-compile)
        shell: bash
        run: |
          for target in ${{ matrix.cli_targets }}; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            OUT="ditherforge-cli-${GOOS}-${GOARCH}${EXT}"
            if [ -f "$OUT" ]; then
              echo "Skipping ${GOOS}/${GOARCH} (already built with CGAL)"
              continue
            fi
            echo "Building CLI for ${GOOS}/${GOARCH} (no CGAL)..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -o "$OUT" ./cmd/ditherforge
          done

      # --- Smoke test (Linux only) ---

      - name: Smoke test
        if: runner.os == 'Linux'
        run: |
          ./ditherforge-cli-linux-amd64 --version
          go test -tags cgal -timeout 2m ./internal/alphawrap/...
          go test -timeout 2m ./internal/...

      # --- Package ---

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: tar.gz the binary
          mkdir -p pkg
          cp build/bin/ditherforge pkg/
          cp README.md LICENSE pkg/
          tar czf "ditherforge-${VERSION}-linux-amd64.tar.gz" -C pkg .
          rm -rf pkg

          # CLI: tar.gz for each arch
          for arch in amd64 arm64; do
            mkdir -p pkg
            cp "ditherforge-cli-linux-${arch}" pkg/ditherforge-cli
            cp README.md LICENSE pkg/
            tar czf "ditherforge-cli-${VERSION}-linux-${arch}.tar.gz" -C pkg .
            rm -rf pkg
          done

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: zip the exe
          mkdir -p pkg
          cp build/bin/ditherforge.exe pkg/
          cp README.md LICENSE pkg/
          7z a "ditherforge-${VERSION}-windows-amd64.zip" ./pkg/*
          rm -rf pkg

          # CLI: zip
          mkdir -p pkg
          cp ditherforge-cli-windows-amd64.exe pkg/ditherforge-cli.exe
          cp README.md LICENSE pkg/
          7z a "ditherforge-cli-${VERSION}-windows-amd64.zip" ./pkg/*
          rm -rf pkg

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: create DMG with app bundle and getting-started doc
          mkdir -p dmg-staging
          cp -R build/bin/ditherforge.app dmg-staging/
          cp build/macos-readme.html "dmg-staging/Getting Started.html"
          hdiutil create -volname "DitherForge" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "ditherforge-${VERSION}-macos-universal.dmg"
          rm -rf dmg-staging

          # CLI: universal binary via lipo, sign, then tar.gz
          lipo -create -output ditherforge-cli \
            ditherforge-cli-darwin-amd64 \
            ditherforge-cli-darwin-arm64
          mkdir -p pkg
          cp ditherforge-cli pkg/
          cp README.md LICENSE pkg/
          tar czf "ditherforge-cli-${VERSION}-macos-universal.tar.gz" -C pkg .
          rm -rf pkg

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            ditherforge-*.tar.gz
            ditherforge-*.zip
            ditherforge-*.exe
            ditherforge-*.dmg

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'VersionSemver = ' internal/pipeline/version.go | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then echo "::error::Failed to extract version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing "latest" release and tag if present.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git tag -f latest
          git push -f origin latest

          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA:0:8}"
          cat > notes.md <<EOF
          Automated build from main branch (v${VERSION}, commit ${SHORT_SHA}).

          ## Downloads

          **GUI (desktop app):**
          - Linux: \`ditherforge-${VERSION}-linux-amd64.tar.gz\`
          - Windows: \`ditherforge-${VERSION}-windows-amd64.zip\`
          - macOS: \`ditherforge-${VERSION}-macos-universal.dmg\`

          **CLI only:**
          - Linux amd64: \`ditherforge-cli-${VERSION}-linux-amd64.tar.gz\`
          - Linux arm64: \`ditherforge-cli-${VERSION}-linux-arm64.tar.gz\`
          - Windows: \`ditherforge-cli-${VERSION}-windows-amd64.zip\`
          - macOS universal: \`ditherforge-cli-${VERSION}-macos-universal.tar.gz\`
          EOF
          # Strip leading whitespace from heredoc (YAML indentation).
          sed -i 's/^          //' notes.md

          gh release create latest \
            --title "Latest build (v${VERSION})" \
            --notes-file notes.md \
            --prerelease \
            artifacts/*
