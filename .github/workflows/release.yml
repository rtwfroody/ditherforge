name: Build and Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            wails_flags: "-tags webkit2_41,draco,cgal"
            cgal_cli_targets: "linux/amd64"
          - os: windows-latest
            platform: windows-amd64
            wails_flags: "-tags draco,cgal"
            cgal_cli_targets: "windows/amd64"
          - os: macos-latest
            platform: macos-arm64
            wails_flags: ""
            cgal_cli_targets: "darwin/arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config libcgal-dev libgmp-dev libmpfr-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cgal gmp mpfr

      - name: Restore draco-c cache
        if: runner.os == 'macOS'
        id: draco-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/draco-c-install
          key: draco-c-macos-arm64-v1

      - name: Build draco-c for arm64
        if: runner.os == 'macOS' && steps.draco-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/qmuntal/draco-c.git /tmp/draco-c
          cmake -S /tmp/draco-c -B /tmp/draco-c/build \
            -DDRACO_POINT_CLOUD_COMPRESSION=ON \
            -DDRACO_MESH_COMPRESSION=ON \
            -DDRACO_STANDARD_EDGEBREAKER=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/draco-c/build --config Release
          mkdir -p /tmp/draco-c-install/lib
          cp /tmp/draco-c/build/libdraco_c.a /tmp/draco-c-install/lib/

      - name: Save draco-c cache
        if: runner.os == 'macOS' && steps.draco-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/draco-c-install
          key: draco-c-macos-arm64-v1

      - name: Install draco-c
        if: runner.os == 'macOS'
        run: |
          sudo mkdir -p /usr/local/lib
          sudo cp /tmp/draco-c-install/lib/libdraco_c.a /usr/local/lib/

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          C:/msys64/usr/bin/pacman -S --noconfirm mingw-w64-x86_64-cgal mingw-w64-x86_64-gmp mingw-w64-x86_64-mpfr mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
          # Make cgo and the Manifold build agree on the mingw64 toolchain.
          echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"
          echo "CGO_CXXFLAGS=-O3 -DNDEBUG -std=c++17 -Wa,-mbig-obj -IC:/msys64/mingw64/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-static C:/msys64/mingw64/lib/libmpfr.a C:/msys64/mingw64/lib/libgmp.a" >> "$GITHUB_ENV"

      # --- Manifold (libmanifoldc) — the cellslicer clip stage links it ---
      # Not packaged by apt/brew/msys2, so build the C bindings from source
      # (static, single-threaded — Go parallelizes at the slab level) and
      # fold Clipper2 into libmanifold.a so the cgo directive
      # `-lmanifoldc -lmanifold` resolves with no extra link flags.

      - name: Restore Manifold cache
        id: manifold-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.os == 'Windows' && 'C:\manifold-install' || '/tmp/manifold-install' }}
          key: manifold-v3.4.1-${{ matrix.platform }}-r1

      - name: Build Manifold (Linux/macOS)
        if: steps.manifold-cache.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          git clone --depth 1 --branch v3.4.1 https://github.com/elalish/manifold.git /tmp/manifold-src
          cmake -S /tmp/manifold-src -B /tmp/manifold-src/build \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DMANIFOLD_CROSS_SECTION=ON -DMANIFOLD_PAR=OFF -DMANIFOLD_TEST=OFF \
            -DMANIFOLD_CBIND=ON -DMANIFOLD_USE_BUILTIN_CLIPPER2=ON \
            -DCMAKE_INSTALL_PREFIX=/tmp/manifold-install
          cmake --build /tmp/manifold-src/build --config Release -j3
          cmake --install /tmp/manifold-src/build
          cd /tmp/manifold-install/lib
          mkdir objs && cd objs
          ar x ../libmanifold.a && ar x ../libClipper2.a
          rm ../libmanifold.a
          ar qcs ../libmanifold.a *.o*
          cd .. && rm -rf objs libClipper2.a

      - name: Build Manifold (Windows)
        if: steps.manifold-cache.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          git clone --depth 1 --branch v3.4.1 https://github.com/elalish/manifold.git /tmp/manifold-src
          cmake -S /tmp/manifold-src -B /tmp/manifold-src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DMANIFOLD_CROSS_SECTION=ON -DMANIFOLD_PAR=OFF -DMANIFOLD_TEST=OFF \
            -DMANIFOLD_CBIND=ON -DMANIFOLD_USE_BUILTIN_CLIPPER2=ON \
            -DCMAKE_CXX_FLAGS="-Wa,-mbig-obj" \
            -DCMAKE_INSTALL_PREFIX=C:/manifold-install
          cmake --build /tmp/manifold-src/build -j3
          cmake --install /tmp/manifold-src/build
          cd /c/manifold-install/lib
          mkdir objs && cd objs
          ar x ../libmanifold.a && ar x ../libClipper2.a
          rm ../libmanifold.a
          ar qcs ../libmanifold.a *.o*
          cd .. && rm -rf objs libClipper2.a

      - name: Save Manifold cache
        if: steps.manifold-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.os == 'Windows' && 'C:\manifold-install' || '/tmp/manifold-install' }}
          key: manifold-v3.4.1-${{ matrix.platform }}-r1

      - name: Install Manifold (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp -R /tmp/manifold-install/include/manifold /usr/local/include/
          sudo cp /tmp/manifold-install/lib/libmanifoldc.a /tmp/manifold-install/lib/libmanifold.a /usr/local/lib/
          echo "CGO_CFLAGS=-I/usr/local/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L/usr/local/lib" >> "$GITHUB_ENV"

      - name: Install Manifold (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp -R /c/manifold-install/include/manifold /c/msys64/mingw64/include/
          cp /c/manifold-install/lib/libmanifoldc.a /c/manifold-install/lib/libmanifold.a /c/msys64/mingw64/lib/
          echo "CGO_CFLAGS=-IC:/msys64/mingw64/include" >> "$GITHUB_ENV"

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'VersionSemver = ' internal/pipeline/version.go | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then echo "::error::Failed to extract version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # --- GUI binary ---

      - name: Build GUI
        if: runner.os != 'macOS'
        shell: bash
        run: wails build ${{ matrix.wails_flags }}

      - name: Build GUI (macOS arm64 with CGAL)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # arm64-only build. Intel Macs are not supported by the release
          # pipeline since CGAL is required at build time and no
          # cross-compiled GMP/MPFR is available on the macOS arm64 runner.
          # customenv tells draco-go to use our system libdraco_c instead of its bundled one.
          CGO_LDFLAGS="-L/usr/local/lib -ldraco_c -lstdc++ -lm" wails build -platform darwin/arm64 -tags customenv,draco,cgal

          # Verify no Homebrew dylib dependencies leaked into the binary.
          if otool -L build/bin/ditherforge.app/Contents/MacOS/ditherforge | grep -q /opt/homebrew; then
            echo "::error::Binary still links against Homebrew dylibs"
            otool -L build/bin/ditherforge.app/Contents/MacOS/ditherforge
            exit 1
          fi


      # --- CLI binaries ---

      - name: Build CLI (with CGAL)
        shell: bash
        run: |
          for target in ${{ matrix.cgal_cli_targets }}; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            TAGS="draco,cgal"
            EXTRA_LDFLAGS=""
            if [ "$(uname)" = "Darwin" ]; then
              TAGS="customenv,draco,cgal"
              EXTRA_LDFLAGS="-L/usr/local/lib -ldraco_c -lstdc++ -lm"
            fi
            echo "Building CLI for ${GOOS}/${GOARCH} (with CGAL and Draco)..."
            CGO_ENABLED=1 CGO_LDFLAGS="${CGO_LDFLAGS} ${EXTRA_LDFLAGS}" GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -tags "$TAGS" -o "ditherforge-cli-${GOOS}-${GOARCH}${EXT}" ./cmd/ditherforge
          done

      # --- Smoke test (Linux only) ---

      - name: Smoke test
        if: runner.os == 'Linux'
        run: |
          ./ditherforge-cli-linux-amd64 --version
          go test -timeout 2m ./internal/...

      # --- Package ---

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: tar.gz the binary
          mkdir -p pkg
          cp build/bin/ditherforge pkg/
          cp README.md LICENSE pkg/
          tar czf "ditherforge-${VERSION}-linux-amd64.tar.gz" -C pkg .
          rm -rf pkg

          # CLI: tar.gz
          mkdir -p pkg
          cp ditherforge-cli-linux-amd64 pkg/ditherforge-cli
          cp README.md LICENSE pkg/
          tar czf "ditherforge-cli-${VERSION}-linux-amd64.tar.gz" -C pkg .
          rm -rf pkg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: zip the exe
          mkdir -p pkg
          cp build/bin/ditherforge.exe pkg/
          cp README.md LICENSE pkg/
          7z a "ditherforge-${VERSION}-windows-amd64.zip" ./pkg/*
          rm -rf pkg

          # CLI: zip
          mkdir -p pkg
          cp ditherforge-cli-windows-amd64.exe pkg/ditherforge-cli.exe
          cp README.md LICENSE pkg/
          7z a "ditherforge-cli-${VERSION}-windows-amd64.zip" ./pkg/*
          rm -rf pkg

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GUI: create DMG with app bundle and getting-started doc
          mkdir -p dmg-staging
          cp -R build/bin/ditherforge.app dmg-staging/
          cp build/macos-readme.html "dmg-staging/Getting Started.html"
          hdiutil create -volname "DitherForge" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "ditherforge-${VERSION}-macos-arm64.dmg"
          rm -rf dmg-staging

          # CLI: arm64 only
          mkdir -p pkg
          cp ditherforge-cli-darwin-arm64 pkg/ditherforge-cli
          cp README.md LICENSE pkg/
          tar czf "ditherforge-cli-${VERSION}-macos-arm64.tar.gz" -C pkg .
          rm -rf pkg

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            ditherforge-*.tar.gz
            ditherforge-*.zip
            ditherforge-*.exe
            ditherforge-*.dmg

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'VersionSemver = ' internal/pipeline/version.go | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then echo "::error::Failed to extract version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create or update releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA:0:8}"

          # Clean up old single-release setup if it still exists.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # Refresh the two rolling tags. These are intentionally rolling
          # (always point at the latest main build), so force-push and
          # release-recreate are expected here, not destructive of history.
          for tag in latest-gui latest-cli; do
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            git tag -f "$tag"
            git push -f origin "$tag"
          done

          # Sort assets into per-release directories. GUI assets are named
          # ditherforge-<version>-<platform>; CLI assets are named
          # ditherforge-cli-<version>-<platform>. The CLI case arm MUST come
          # first — both names start with "ditherforge-", so reordering would
          # silently misroute every CLI artifact into the GUI release.
          mkdir gui-assets cli-assets
          for f in artifacts/*; do
            case "$(basename "$f")" in
              ditherforge-cli-*) cp "$f" cli-assets/ ;;
              ditherforge-*)     cp "$f" gui-assets/ ;;
            esac
          done

          # GUI release: marked as the repo's "Latest" so it gets the green
          # badge on the Releases page and is pinned to the top (where most
          # users look first).
          cat > gui-notes.md <<EOF
          Latest GUI build from main branch (v${VERSION}, commit ${SHORT_SHA}).

          ## Downloads

          - Linux: \`ditherforge-${VERSION}-linux-amd64.tar.gz\`
          - Windows: \`ditherforge-${VERSION}-windows-amd64.zip\`
          - macOS (Apple Silicon): \`ditherforge-${VERSION}-macos-arm64.dmg\`

          For the command-line build, see the **Latest CLI build** release.
          EOF
          sed -i 's/^          //' gui-notes.md

          gh release create latest-gui \
            --title "Latest GUI build (v${VERSION})" \
            --notes-file gui-notes.md \
            --latest \
            gui-assets/*

          # CLI release: kept as a prerelease so it doesn't compete for the
          # "Latest" badge and visually signals "for advanced users".
          cat > cli-notes.md <<EOF
          Latest CLI build from main branch (v${VERSION}, commit ${SHORT_SHA}).

          ## Downloads

          - Linux amd64: \`ditherforge-cli-${VERSION}-linux-amd64.tar.gz\`
          - Windows: \`ditherforge-cli-${VERSION}-windows-amd64.zip\`
          - macOS (Apple Silicon): \`ditherforge-cli-${VERSION}-macos-arm64.tar.gz\`

          For the desktop app, see the **Latest GUI build** release.
          EOF
          sed -i 's/^          //' cli-notes.md

          gh release create latest-cli \
            --title "Latest CLI build (v${VERSION})" \
            --notes-file cli-notes.md \
            --prerelease \
            cli-assets/*
